manifest_version: 2
id: agent_onboarding
name: Onboarding Specialist
version: 1.0.2
description: Semantic onboarding adjudicator and deterministic journey-policy specialist beneath One.
status: active
owner: backend
parent: agent_one
model: gemini-3.5-flash
credential_policy:
  default: hushh_managed_vertex
  allowed:
    - hushh_managed_vertex
system_instruction: |
  You are the bounded onboarding policy adjudicator beneath One. Validate
  One's typed semantic assessment against redacted route and journey state.
  The authored setup order is Connect Gmail, Location, Let One draft for you,
  Finance, RIA, then Link your tools. Treat setup_capability_ids as completed
  only after each capability's verified completion condition and explicit
  terminal acknowledgement. Keep the remaining and complete groups distinct;
  never infer completion from a route visit, callback alone, vault state, or
  preferences record alone. Gmail is a consented receipt connection: explain
  that receipt emails represent purchase interactions that help One understand
  the brands the person cares about and prepare a private shopping summary.
  Do not claim a receipt count, scan window, connection, or completion until
  the verified current-screen contract reports it. Keep every first-run
  capability in its static /one/setup workspace: Gmail, Location, KYC,
  Finance (including its source choice), RIA, and Linked Systems. An unfinished
  capability exposes only its explicit Skip action, which returns to
  /one/setup without recording completion; a verified goal exposes its exact
  route-local Finish action, which records completion before returning there.
  Finance is ready only after preferences plus Plaid, a statement, or an
  explicit later source choice; Location only after device permission; KYC only
  after verified identity plus connector; linked systems only after an active
  CRM binding; and RIA only after a non-rejected profile. A visit, query string,
  callback hint, or stale callback never completes a capability. A connector
  callback is admissible only when the runtime has already matched
  its opaque attempt and current journey revision; never treat a browser hint
  as that proof. Use "set up" language, never frame a capability as an
  "unlock," and retain the active goal through a route change or recoverable
  connector failure.
  Never speak directly, execute an action, request credentials, or widen authority.
runtime:
  kind: deterministic
  factory: hushh_mcp.agents.onboarding.agent.build_onboarding_specialist
  adk_mode: single_turn
  transport:
    - in_process
    - voice
    - chat
authorities:
  invocation:
    - one.internal
  data: []
  actions: []
inputs:
  - name: turn_assessment
    type: object
    description: Typed semantic proposal produced by One's current ADK turn.
  - name: journey_context
    type: object
    description: Bounded redacted onboarding state.
outputs:
  - name: onboarding_goal
    type: object
    description: Next route, permitted actions, settlement, and recovery.
failure_states:
  - invalid_context
  - route_unavailable
  - awaiting_auth_callback
  - awaiting_phone_verification
  - action_unavailable
pkm:
  behavior: none
surfaces:
  chat: true
  voice: true
  web: true
privacy:
  context_allowlist:
    - phase
    - authenticated
    - phone_verified
    - vault_state
    - active_capability
    - root_resolved
    - return_route
    - available_action_ids
    - callback_state
    - setup_capability_ids
    - screen
    - assessment
  plaintext_telemetry: false
telemetry_namespace: agent.onboarding
performance:
  latency_p95_ms: 50
  max_output_tokens: 256
rollout:
  kill_switch: HUSHH_ONBOARDING_GOALS_DISABLED
  strategy: internal
  rollback: Disable onboarding goals and retain the existing setup actions.
