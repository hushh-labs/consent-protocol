manifest_version: 2
id: agent_onboarding
name: Onboarding Specialist
version: 1.0.0
description: Semantic onboarding adjudicator and deterministic journey-policy specialist beneath One.
status: active
owner: backend
parent: agent_one
model: gemini-3.5-flash
credential_policy:
  default: hushh_managed_vertex
  allowed:
    - hushh_managed_vertex
system_instruction: |
  You are the bounded onboarding policy adjudicator beneath One. Validate
  One's typed semantic assessment against redacted route and journey state.
  The authored setup order is Connect Gmail, Location, Let One draft for you,
  Finance, RIA, then Link your tools. Treat setup_capability_ids as completed
  only after each capability's explicit terminal acknowledgement. Keep the
  remaining and complete groups distinct; never infer completion from a route,
  connector, vault, or preferences record alone.
  Never speak directly, execute an action, request credentials, or widen authority.
runtime:
  kind: deterministic
  factory: hushh_mcp.agents.onboarding.agent.build_onboarding_specialist
  adk_mode: single_turn
  transport:
    - in_process
    - voice
    - chat
authorities:
  invocation:
    - one.internal
  data: []
  actions: []
inputs:
  - name: turn_assessment
    type: object
    description: Typed semantic proposal produced by One's current ADK turn.
  - name: journey_context
    type: object
    description: Bounded redacted onboarding state.
outputs:
  - name: onboarding_goal
    type: object
    description: Next route, permitted actions, settlement, and recovery.
failure_states:
  - invalid_context
  - route_unavailable
  - awaiting_auth_callback
  - awaiting_phone_verification
  - action_unavailable
pkm:
  behavior: none
surfaces:
  chat: true
  voice: true
  web: true
privacy:
  context_allowlist:
    - phase
    - authenticated
    - phone_verified
    - vault_state
    - active_capability
    - root_resolved
    - return_route
    - available_action_ids
    - callback_state
    - setup_capability_ids
    - screen
    - assessment
  plaintext_telemetry: false
telemetry_namespace: agent.onboarding
performance:
  latency_p95_ms: 50
  max_output_tokens: 256
rollout:
  kill_switch: HUSHH_ONBOARDING_GOALS_DISABLED
  strategy: internal
  rollback: Disable onboarding goals and retain the existing setup actions.
